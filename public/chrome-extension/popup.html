<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PendragonX Quick Notes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
    }
    
    .header {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
    }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: #a1a1aa;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .tab:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    
    .tab.active {
      color: #8b5cf6;
      border-bottom: 2px solid #8b5cf6;
    }
    
    .content {
      padding: 12px;
    }
    
    .scratch-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #e4e4e7;
      font-size: 13px;
      resize: vertical;
      font-family: inherit;
    }
    
    textarea:focus {
      outline: none;
      border-color: #8b5cf6;
    }
    
    textarea::placeholder {
      color: #71717a;
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: white;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e4e4e7;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
    }
    
    .note-card {
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .note-card p {
      font-size: 12px;
      line-height: 1.5;
      color: #d4d4d8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .note-meta span {
      font-size: 10px;
      color: #71717a;
    }
    
    .note-actions {
      display: flex;
      gap: 4px;
    }
    
    .note-actions button {
      padding: 4px 8px;
      font-size: 10px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 4px;
      color: #a1a1aa;
      cursor: pointer;
    }
    
    .note-actions button:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    
    .note-actions button.delete:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #71717a;
    }
    
    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    
    .empty-state p {
      font-size: 12px;
    }
    
    .sticky-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .sticky-note {
      padding: 10px;
      border-radius: 4px;
      min-height: 80px;
      font-size: 11px;
      position: relative;
    }
    
    .sticky-note textarea {
      width: 100%;
      height: 100%;
      min-height: 60px;
      background: transparent;
      border: none;
      color: #1a1a1a;
      font-size: 11px;
      resize: none;
    }
    
    .sticky-note textarea:focus {
      outline: none;
    }
    
    .sticky-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #333;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .sticky-note:hover .sticky-delete {
      opacity: 1;
    }
    
    .color-picker {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    
    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .color-btn:hover {
      transform: scale(1.1);
    }
    
    .color-btn.active {
      border-color: #fff;
    }
    
    .footer {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    
    .footer a {
      font-size: 11px;
      color: #8b5cf6;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <h1>PendragonX Quick Notes</h1>
  </div>
  
  <div class="tabs">
    <button class="tab active" data-tab="scratch">Scratch Pad</button>
    <button class="tab" data-tab="sticky">Sticky Notes</button>
  </div>
  
  <div class="content">
    <!-- Scratch Pad Tab -->
    <div id="scratch-tab" class="scratch-area">
      <textarea id="scratch-input" placeholder="Jot down quick thoughts, ideas, or notes..."></textarea>
      <div class="actions">
        <button class="btn btn-primary" id="save-scratch">Save Note</button>
        <button class="btn btn-secondary" id="clear-scratch">Clear</button>
      </div>
      <div id="notes-list" class="notes-list"></div>
    </div>
    
    <!-- Sticky Notes Tab -->
    <div id="sticky-tab" style="display: none;">
      <div class="color-picker" id="color-picker"></div>
      <button class="btn btn-primary" id="add-sticky" style="margin-bottom: 10px; width: 100%;">+ Add Sticky Note</button>
      <div id="sticky-grid" class="sticky-grid"></div>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://pendragonx.com" target="_blank">Open PendragonX App →</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
