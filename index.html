      #app-loading {

        padding: 20px;
      }
      
      #app-loading-title {
        display: flex;

        justify-content: center;
        gap: 8px;
        margin-bottom: 32px;
      }
      
      #app-loading-icon {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }
      
      #app-loading-title h1 {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(135deg, hsl(36 72% 48%), hsl(36 60% 38%));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      #app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(36 30% 88%);
        border-top-color: hsl(36 72% 48%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      
      #app-loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: hsl(0 0% 45%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: linear-gradient(135deg, hsl(220 15% 8%), hsl(220 15% 11%));
        }
        #app-loading-title h1 {
          background: linear-gradient(135deg, hsl(36 72% 52%), hsl(36 50% 42%));
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        #app-loading-spinner {
          border-color: hsl(220 10% 20%);
          border-top-color: hsl(36 72% 52%);
        }

          color: hsl(0 0% 65%);
        }

          <img id="app-loading-icon" src="/icon-192x192.png" alt="PendragonX" aria-hidden="true" />

        </div>

      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading screen when React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        const rootObserver = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loading = document.getElementById('app-loading');
            if (loading) {
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() { loading.remove(); }, 300);
            }
            rootObserver.disconnect();
          }
        });
        rootObserver.observe(document.getElementById('root'), { childList: true });
      });
    </script>
