<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PendragonX</title>
    <meta name="description" content="Revolutionary Zettelkasten system with AI-powered insights, visual knowledge graphs, and advanced organizational tools">
    <meta name="author" content="Lovable" />
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/src/index.css" as="style" />
    
    <!-- Inline critical CSS for instant First Contentful Paint -->
    <style>
      /* Loading screen styles */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(0 0% 99%), hsl(0 0% 97%));
        z-index: 9999;
      }
      
      #app-loading-content {
        text-align: center;
      }
      
      #app-loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid hsl(220 15% 90%);
        border-top-color: hsl(212 100% 42%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      
      #app-loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: hsl(0 0% 45%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: linear-gradient(135deg, hsl(0 0% 7%), hsl(0 0% 9%));
        }
        #app-loading-spinner {
          border-color: hsl(0 0% 18%);
          border-top-color: hsl(212 100% 42%);
        }
        #app-loading-text {
          color: hsl(0 0% 65%);
        }
      }
    </style>
    

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/Y2B2K0ExlLhjZt1L59MceqNQLdp1/social-images/social-1758934637901-PendragonLogo-01.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/Y2B2K0ExlLhjZt1L59MceqNQLdp1/social-images/social-1758934637901-PendragonLogo-01.jpg">
    
  
  
  
  <link rel="icon" type="image/x-icon" href="https://storage.googleapis.com/gpt-engineer-file-uploads/Y2B2K0ExlLhjZt1L59MceqNQLdp1/uploads/1758934599383-PendragonLogo-02.png">
  <meta property="og:title" content="PendragonX">
  <meta name="twitter:title" content="PendragonX">
  <meta property="og:description" content="Revolutionary Zettelkasten system with AI-powered insights, visual knowledge graphs, and advanced organizational tools">
  <meta name="twitter:description" content="Revolutionary Zettelkasten system with AI-powered insights, visual knowledge graphs, and advanced organizational tools">
</head>

  <body>
    <!-- Instant loading indicator for fast First Contentful Paint -->
    <div id="app-loading">
      <div id="app-loading-content">
        <div id="app-loading-spinner"></div>
        <div id="app-loading-text">Loading PendragonX...</div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading screen when React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        const rootObserver = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loading = document.getElementById('app-loading');
            if (loading) {
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() { loading.remove(); }, 300);
            }
            rootObserver.disconnect();
          }
        });
        rootObserver.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
