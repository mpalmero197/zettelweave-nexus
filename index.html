    <!-- Inline critical CSS for instant First Contentful Paint -->
    <style>
      /* Loading screen styles */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(0 0% 99%), hsl(0 0% 97%));
        z-index: 9999;
      }
      
      #app-loading-content {
        text-align: center;
        max-width: 400px;
        padding: 20px;
      }
      
      #app-loading-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 32px;
      }
      
      #app-loading-icon {
        width: 32px;
        height: 32px;
        color: hsl(0 0% 15%);
      }
      
      #app-loading-title h1 {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(135deg, hsl(0 0% 15%), hsl(0 0% 30%));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      #app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(220 15% 90%);
        border-top-color: hsl(0 0% 15%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      
      #app-loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: hsl(0 0% 45%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: linear-gradient(135deg, hsl(0 0% 7%), hsl(0 0% 9%));
        }
        #app-loading-icon {
          color: hsl(0 0% 85%);
        }
        #app-loading-title h1 {
          background: linear-gradient(135deg, hsl(0 0% 85%), hsl(0 0% 70%));
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        #app-loading-spinner {
          border-color: hsl(0 0% 18%);
          border-top-color: hsl(0 0% 85%);
        }
        #app-loading-text {
          color: hsl(0 0% 65%);
        }
      }
    </style>

  <body>
    <!-- Instant loading indicator for fast First Contentful Paint -->
    <div id="app-loading" role="progressbar" aria-label="Loading PendragonX">
      <div id="app-loading-content">
        <div id="app-loading-title">
          <img id="app-loading-icon" src="/icon-192x192.png" alt="PendragonX" aria-hidden="true" />
          <h1>PendragonX</h1>
        </div>
        <div id="app-loading-spinner"></div>
        <div id="app-loading-text">Loading your knowledge system...</div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading screen when React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        const rootObserver = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loading = document.getElementById('app-loading');
            if (loading) {
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() { loading.remove(); }, 300);
            }
            rootObserver.disconnect();
          }
        });
        rootObserver.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
