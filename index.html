<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PendragonX</title>
    <meta name="description" content="Revolutionary Zettelkasten system with AI-powered insights, visual knowledge graphs, and advanced organizational tools">
    <meta name="author" content="Lovable" />
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/src/index.css" as="style" />
    
    <!-- Inline critical CSS for instant First Contentful Paint -->
    <style>
      /* Loading screen styles */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(0 0% 99%), hsl(0 0% 97%));
        z-index: 9999;
      }
      
      #app-loading-content {
        text-align: center;
        max-width: 400px;
        padding: 20px;
      }
      
      #app-loading-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 32px;
      }
      
      #app-loading-icon {
        width: 32px;
        height: 32px;
        color: hsl(212 100% 42%);
      }
      
      #app-loading-title h1 {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(135deg, hsl(212 100% 42%), hsl(212 100% 50%));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      #app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(220 15% 90%);
        border-top-color: hsl(212 100% 42%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      
      #app-loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: hsl(0 0% 45%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: linear-gradient(135deg, hsl(0 0% 7%), hsl(0 0% 9%));
        }
        #app-loading-icon {
          color: hsl(212 100% 42%);
        }
        #app-loading-title h1 {
          background: linear-gradient(135deg, hsl(212 100% 42%), hsl(212 100% 50%));
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        #app-loading-spinner {
          border-color: hsl(0 0% 18%);
          border-top-color: hsl(212 100% 42%);
        }
        #app-loading-text {
          color: hsl(0 0% 65%);
        }
      }
    </style>
    

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/Y2B2K0ExlLhjZt1L59MceqNQLdp1/social-images/social-1758934637901-PendragonLogo-01.jpg">

</head>

  <body>
    <!-- Instant loading indicator for fast First Contentful Paint -->
    <div id="app-loading">
      <div id="app-loading-content">
        <div id="app-loading-title">
          <svg id="app-loading-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
            <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
          </svg>
          <h1>PendragonX</h1>
        </div>
        <div id="app-loading-spinner"></div>
        <div id="app-loading-text">Loading your knowledge system...</div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading screen when React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        const rootObserver = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loading = document.getElementById('app-loading');
            if (loading) {
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() { loading.remove(); }, 300);
            }
            rootObserver.disconnect();
          }
        });
        rootObserver.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
